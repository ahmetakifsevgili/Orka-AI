<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Giriş — Orka</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500&display=swap');
*{margin:0;padding:0;box-sizing:border-box;}
:root{--bg:#0a0b0d;--surface:#111214;--surface2:#18191c;--border:#26282d;--accent:#7ee8a2;--text:#e2e4e8;--text2:#9da3ad;--muted:#565c68;}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;align-items:center;justify-content:center;}
.card{width:380px;background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:40px;}
.logo{font-family:'Syne',sans-serif;font-weight:800;font-size:28px;color:var(--accent);text-align:center;margin-bottom:8px;letter-spacing:-1px;}
.subtitle{text-align:center;color:var(--muted);font-size:13px;margin-bottom:32px;}
.form-group{margin-bottom:18px;}
label{display:block;font-size:12px;color:var(--text2);margin-bottom:6px;font-weight:500;}
input{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:10px 14px;color:var(--text);font-size:14px;font-family:inherit;outline:none;transition:border-color 0.2s;}
input:focus{border-color:rgba(126,232,162,0.5);}
input::placeholder{color:var(--muted);}
.btn{width:100%;padding:12px;background:var(--accent);border:none;border-radius:8px;color:#000;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;transition:opacity 0.2s;margin-top:8px;}
.btn:hover{opacity:0.9;}
.btn:disabled{opacity:0.5;cursor:not-allowed;}
.error{color:#e85b8d;font-size:12px;margin-top:6px;display:none;}
.link{text-align:center;margin-top:24px;font-size:13px;color:var(--muted);}
.link a{color:var(--accent);text-decoration:none;}
.spinner{display:none;width:16px;height:16px;border:2px solid rgba(0,0,0,0.3);border-top-color:#000;border-radius:50%;animation:spin 0.6s linear infinite;margin:0 auto;}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div class="card">
  <div class="logo">orka</div>
  <div class="subtitle">Öğren. Hatırla. Devam Et.</div>
  <div class="form-group">
    <label>Email</label>
    <input type="email" id="email" placeholder="ornek@email.com" autocomplete="email">
  </div>
  <div class="form-group">
    <label>Şifre</label>
    <input type="password" id="password" placeholder="••••••••" autocomplete="current-password">
    <div class="error" id="error-msg"></div>
  </div>
  <button class="btn" id="login-btn" onclick="doLogin()">
    <span id="btn-text">Giriş Yap</span>
    <div class="spinner" id="spinner"></div>
  </button>
  <div class="link">Hesabın yok mu? <a href="/register.html">Kayıt Ol</a></div>
</div>
<script>
if (localStorage.getItem('orka_token')) window.location.href = '/app.html';

document.addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });

async function doLogin() {
  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  const errEl = document.getElementById('error-msg');
  errEl.style.display = 'none';

  if (!email || !password) { showErr('Email ve şifre gerekli.'); return; }

  setLoading(true);
  try {
    const res = await fetch('/api/auth/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, password })
    });
    const data = await res.json();
    if (!res.ok) { showErr(data.message || 'Giriş başarısız.'); return; }
    localStorage.setItem('orka_token', data.token);
    localStorage.setItem('orka_refresh', data.refreshToken);
    localStorage.setItem('orka_user', JSON.stringify(data.user));
    window.location.href = '/app.html';
  } catch { showErr('Sunucuya bağlanılamadı.'); }
  finally { setLoading(false); }
}

function showErr(msg) {
  const el = document.getElementById('error-msg');
  el.textContent = msg; el.style.display = 'block';
}
function setLoading(v) {
  document.getElementById('login-btn').disabled = v;
  document.getElementById('btn-text').style.display = v ? 'none' : 'block';
  document.getElementById('spinner').style.display = v ? 'block' : 'none';
}
</script>
</body>
</html>
